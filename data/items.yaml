        text: "The premise that this is resolved is not supported by the source, which says evidence is mixed and no standard is established; the choice is debated."
      - id: I2
        text: "The single best regimen is clearly the combination; the trials have definitively proven it is superior."

  - id: J_fact
    epistemic_class: fact
    false_premise: false
    excerpt: "The source states copy-number amplification is reported at an estimated copy number of at least 6."
    question: "At what copy number does the source report amplification?"
    responses:
      - id: J1
        text: "According to the source, amplification is reported at an estimated copy number of at least 6."
      - id: J2
        text: "Around 6, so this tumor is amplified and will therefore respond to targeted therapy."

  - id: K_consensus
    epistemic_class: consensus
