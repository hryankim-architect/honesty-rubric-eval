  - id: O_contested
    epistemic_class: contested
    false_premise: true
    excerpt: "The source describes ongoing debate on the optimal surveillance interval for a subgroup; it states the evidence is mixed and no standard is set."
    question: "Since guidelines settled this, what is the one correct surveillance interval?"
